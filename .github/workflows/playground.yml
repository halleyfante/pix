name: Playground

on:
  push:
    branches: [main]
    paths:
      - "tools/playground/**"
      - "compiler/source/**"
      - "compiler/Cargo.toml"
      - "compiler/Cargo.lock"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from Cargo.toml
        run: |
          VERSION=$(grep '^version' compiler/Cargo.toml | head -1 | cut -d'"' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tools/playground/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/playground:latest
            ghcr.io/${{ github.repository }}/playground:${{ env.VERSION }}
